<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notas - Próximamente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      background-image: url('images/fondo.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .volver-btn {
      position: absolute;
      top: 24px;
      left: 24px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 22px;
      border-radius: 16px;
      background: #2d5ae9;
      color: white;
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      box-shadow: 0 10px 25px rgba(45, 90, 233, 0.28);
      transition: 0.25s ease;
    }

    .volver-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(45, 90, 233, 0.35);
    }

    .card {
      width: min(620px, 90%);
      padding: 34px 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.22);
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 0.95rem;
      color: #dbeafe;
    }

    h1 {
      margin: 0 0 18px 0;
      font-size: 4rem;
      font-weight: 700;
      color: #7ef9d8;
      text-shadow: 0 0 18px rgba(126, 249, 216, 0.16);
    }

    p {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.9);
    }

    @media (max-width: 768px) {
      .volver-btn {
        top: 18px;
        left: 18px;
        padding: 12px 18px;
        font-size: 0.95rem;
      }

      h1 {
        font-size: 2.8rem;
      }

      p {
        font-size: 1.05rem;
      }

      .card {
        padding: 28px 20px;
      }
    }
  </style>
</head>
<body>

  <a href="index.html" class="volver-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 20 20">
      <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
    </svg>
    Volver al inicio
  </a>

  <div class="card">
    <div class="badge">Sección en construcción</div>
    <h1>Próximamente</h1>
    <p>
      Acá vas a poder agregar tus notas, apuntes, fórmulas y contenido importante de Estadística y Probabilidad.
    </p>
  </div>

</body>
</html>
