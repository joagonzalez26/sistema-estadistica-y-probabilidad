<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Inicio – Sistema de Estadística</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- tsParticles -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.11.1/tsparticles.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
    }

    .admin-panel {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background-color: rgba(20, 20, 20, 0.6);
      backdrop-filter: blur(8px);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .particles-container {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes float-text {
      0% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }

    .animated-gradient-text {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 4rem;
      font-size: 4rem;
      animation: float-text 4s ease-in-out infinite;
    }

    .text-content {
      background-image: linear-gradient(90deg, #40ffaa, #4079ff, #40ffaa, #4079ff, #40ffaa);
      background-size: 300% 100%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: gradient 3s linear infinite;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .spinner {
      width: 44px;
      height: 44px;
      margin-bottom: 4px;
      animation: spinner-y0fdc1 4s infinite ease;
      transform-style: preserve-3d;
    }

    .spinner > div {
      background-color: rgba(64, 121, 255, 0.4);
      height: 100%;
      position: absolute;
      width: 100%;
      border: 2px solid #60a5fa;
    }

    .spinner div:nth-of-type(1) { transform: translateZ(-22px) rotateY(180deg); }
    .spinner div:nth-of-type(2) { transform: rotateY(-270deg) translateX(50%); transform-origin: top right; }
    .spinner div:nth-of-type(3) { transform: rotateY(270deg) translateX(-50%); transform-origin: center left; }
    .spinner div:nth-of-type(4) { transform: rotateX(90deg) translateY(-50%); transform-origin: top center; }
    .spinner div:nth-of-type(5) { transform: rotateX(-90deg) translateY(50%); transform-origin: bottom center; }
    .spinner div:nth-of-type(6) { transform: translateZ(22px); }

    @keyframes spinner-y0fdc1 {
      0% { transform: rotate(45deg) rotateX(-25deg) rotateY(25deg); }
      50% { transform: rotate(45deg) rotateX(-385deg) rotateY(25deg); }
      100% { transform: rotate(45deg) rotateX(-385deg) rotateY(385deg); }
    }
  </style>
</head>

<body class="bg-cover bg-center text-gray-900" style="background-image: url('images/fondo.png');">
  <div id="aurora-bg"></div>

  <div class="admin-panel">
    <!-- Sidebar -->
    <div class="sidebar p-4">
      <div>
        <h1 class="text-2xl font-bold mb-8 text-white"></h1>
        <nav>
          <ul class="space-y-2">
            <li>
              <a href="index.html" class="flex items-center w-full px-4 py-2 bg-blue-700 rounded-md text-white font-medium">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 10l9-7 9 7v11a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2v-4H9v4a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V10z"/>
                </svg>
                Inicio
              </a>
            </li>
            <li>
              <a href="notas.html" class="flex items-center w-full px-4 py-2 hover:bg-blue-600 rounded-md text-white font-medium">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 8h10M7 12h4m1 8h5a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h3"/>
                </svg>
                Archivos
              </a>
            </li>
            <li>
              <a href="estadistica.html" class="flex items-center w-full px-4 py-2 hover:bg-blue-600 rounded-md text-white font-medium">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 19V6m4 13V9m-8 10v-4m12 4V4M5 19v-2"/>
                </svg>
                Estadística
              </a>
            </li>
          </ul>
        </nav>
      </div>

      <!-- Footer con configuración y perfil -->
      <div class="mt-8">
        <a href="configurar.html" class="flex flex-col items-center mb-4">
          <div class="spinner relative mb-5">
            <div></div><div></div><div></div><div></div><div></div><div></div>
          </div>
          <span class="text-sm text-blue-300">Configurar Perfil</span>
        </a>
        <div class="border-t border-blue-400 pt-4">
          <div class="flex items-center">
            <img src="images/perfil.jpg" alt="Foto de perfil de Joaquín" class="rounded-full w-10 h-10 mr-3" />
            <div>
              <p class="font-medium">Software Developer</p>
              <p class="text-xs text-blue-200">Joaquín González</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main content -->
    <main class="w-full min-h-screen relative overflow-hidden">
      <div id="tsparticles" class="particles-container"></div>
      <div class="relative z-10 flex flex-col items-center justify-center h-full">
        <div class="animated-gradient-text">
          <span class="text-content">¡Bienvenido, Joaquín!</span>
        </div>
      </div>
    </main>
  </div>

  <!-- Aurora background + tsParticles config -->
  <link rel="stylesheet" href="aurora/aurora.css" />
  <script type="module" src="aurora/aurora.js"></script>

  <script>
    tsParticles.load("tsparticles", {
      fullScreen: { enable: false },
      detectRetina: true,
      fpsLimit: 60,
      particles: {
        number: { value: 200, density: { enable: true, area: 800 } },
        color: { value: ["#40ffaa", "#4079ff"] },
        shape: { type: "circle" },
        opacity: { value: 0.8, random: { enable: true, minimumValue: 0.4 } },
        size: { value: 4, random: { enable: true, minimumValue: 1 } },
        move: {
          enable: true,
          speed: 0.5,
          direction: "none",
          outModes: { default: "out" }
        }
      },
      interactivity: {
        events: {
          onHover: { enable: true, mode: "repulse" },
          resize: true
        },
        modes: {
          repulse: { distance: 100, duration: 0.4 }
        }
      },
      background: { color: "transparent" }
    });
  </script>
</body>
</html>
